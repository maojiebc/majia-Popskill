name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        # 第三方 Action 固定到完整 SHA（审查 P2-04）：可变 tag 可被上游重指
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Shell syntax（scripts/*.sh 全量 bash -n）
        timeout-minutes: 2
        run: for f in scripts/*.sh; do bash -n "$f"; done

      - name: L10n drift（catalog ↔ 产物 ↔ L() 双向覆盖）
        timeout-minutes: 2
        run: scripts/gen-l10n.sh --check

      - name: Select Xcode 16
        timeout-minutes: 2
        run: |
          XCODE_PATH="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort | tail -n 1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          swift --version

      - name: Build (release · strict concurrency · zero warnings)
        timeout-minutes: 15
        # v2.18 起严格并发保持零警告（曾积到 17 条，Swift 6 模式下全是错误）——
        # 出现任何 warning 即 fail，防回潮
        run: |
          swift build -c release --package-path swift-app -Xswiftc -strict-concurrency=complete 2>&1 | tee build.log
          ! grep -q 'warning:' build.log

      - name: Test
        timeout-minutes: 10
        run: swift test --package-path swift-app
