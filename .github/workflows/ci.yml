name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        timeout-minutes: 2
        run: |
          XCODE_PATH="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort | tail -n 1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          swift --version

      - name: Build (release)
        timeout-minutes: 15
        run: swift build -c release --package-path swift-app

      - name: Test
        timeout-minutes: 10
        run: swift test --package-path swift-app
